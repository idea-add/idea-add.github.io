<!doctype html>
<html lang="ko">
<head>
{{ partial "head.html" . }}
</head>
<body>
  <a class="skip-link" href="#main">본문으로 바로가기</a>
  {{ partial "header.html" . }}
  <main id="main">
    <section class="wrap section not-found">
      <p class="not-found-code">404</p>
      <h1>페이지를 찾을 수 없습니다</h1>
      <p class="page-lead">요청하신 페이지가 삭제되었거나 주소가 변경되었을 수 있습니다.</p>
      <div class="not-found-actions">
        <a class="btn btn-primary" href="{{ "/" | relLangURL }}">홈으로 돌아가기</a>
        <a class="btn btn-secondary" href="{{ "/terms/" | relLangURL }}">용어사전에서 검색하기</a>
      </div>
    </section>
  </main>
  {{ partial "footer.html" . }}
  {{ partial "scripts.html" . }}
</body>
</html>
