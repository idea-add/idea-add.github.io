{{ define "main" }}
<section class="wrap section reveal">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="page-lead">{{ . }}</div>{{ end }}
  </header>

  <div class="card-grid">
    {{ range .Pages.ByTitle }}
    <a class="term-card" href="{{ .RelPermalink }}">
      {{ with .Params.category }}<span class="term-card-tag">{{ . }}</span>{{ end }}
      <h3>{{ .Title }}</h3>
      <p>{{ .Params.summary | default .Summary | truncate 70 }}</p>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
