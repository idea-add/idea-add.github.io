{{ define "main" }}
<section class="wrap section reveal">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="page-lead">{{ . }}</div>{{ end }}
  </header>
  <ul class="plain-list">
    {{ range .Pages }}
    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    {{ end }}
  </ul>
</section>
{{ end }}
