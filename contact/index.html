<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><title>문의하기 - 가족여행 플래너</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <header id="common-header"></header>
  <main>
    <div style="text-align:center; margin-bottom:2rem;">
      <h2>비즈니스 제안 및 콘텐츠 오류 제보</h2>
      <p>가족여행 플래너는 신속하고 투명한 소통을 위해 이메일 소통 창구를 단일 운영하고 있습니다.</p>
    </div>
    <form class="contact-form" onsubmit="alert('본 시스템은 데모입니다. 작성하신 내용은 기재된 공식 이메일 주소(sdlarge.kim@gmail.com)로 직접 전송해 주셔야 책임 편집자에게 가장 신속히 도달합니다.'); return false;">
      <div class="form-group"><label>성함/기관명</label><input type="text" class="form-control" required></div>
      <div class="form-group"><label>회신받을 이메일 주소</label><input type="email" class="form-control" required></div>
      <div class="form-group"><label>문의 세부 내용</label><textarea class="form-control" required></textarea></div>
      <button type="submit" class="btn-wp">문의 발송하기</button>
    </form>
  </main>
  <footer id="common-footer"></footer>
  <script src="../assets/js/db.js"></script><script src="../assets/js/core.js"></script>
</body>
</html>
