name: "📚 용어 추가 요청"
description: "알쏭달쏭 용어사전에 추가했으면 하는 용어를 요청해 주세요."
title: "[용어요청] "
labels: ["용어요청"]
body:
  - type: markdown
    attributes:
      value: |
        헷갈리는 용어를 요청해 주셔서 감사합니다!

        ⚠️ **광고, 홍보, 특정 사이트로 유도하는 링크가 포함된 요청은 안내 없이 삭제(닫힘) 처리됩니다.** 순수하게 용어에 대한 내용만 적어주세요.
  - type: input
    id: term
    attributes:
      label: 추가했으면 하는 용어
      description: 정확한 명칭(약자가 있다면 약자와 풀네임 모두)을 적어주세요.
      placeholder: "예) 딥페이크(Deepfake)"
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 이 용어를 추가했으면 하는 이유 (선택)
      description: 어떤 점이 헷갈리는지, 알고 계신 내용이 있다면 적어주세요. 링크는 넣지 말아주세요.
      placeholder: "예) OO와 자주 헷갈리는데 차이를 잘 모르겠어요."
    validations:
      required: false
  - type: checkboxes
    id: agreement
    attributes:
      label: 확인
      options:
        - label: 광고, 홍보, 링크를 포함하지 않았습니다.
          required: true
