name: Filter term request issues

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  filter:
    if: contains(github.event.issue.labels.*.name, '용어요청')
    runs-on: ubuntu-latest
    steps:
      - name: Check for links and close if found
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || "";
            const urlPattern = /(https?:\/\/|www\.)[^\s)]+/i;

            if (urlPattern.test(body)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: "이 요청에 링크가 포함되어 있어 자동으로 닫혔습니다. 광고/홍보성 게시물을 막기 위한 조치이니 양해 부탁드립니다. 링크 없이 용어 이름과 설명만 다시 등록해 주세요."
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ["스팸-링크포함"]
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: "closed",
                state_reason: "not_planned"
              });
            }
