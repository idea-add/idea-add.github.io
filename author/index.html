<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>책임 편집자 프로필 및 전문 칼럼 - 가족여행 플래너</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <header id="common-header"></header>

  <main>
    <div class="breadcrumb"><a href="../index.html">홈</a> &gt; <span>운영자 허브</span></div>

    <!-- 세션 연동 분기 UI 레이어 -->
    <div id="admin-session-zone"></div>

    <section class="profile-card">
      <div class="profile-avatar">김</div>
      <div>
        <h2>책임 편집인: <span id="prof-name"></span></h2>
        <p style="margin-top:0.5rem; color:#475569;" id="prof-bio"></p>
      </div>
    </section>

    <h2 class="section-title">에디터 인사이트 관점 칼럼</h2>
    <p style="color:#64748b; margin-bottom:2rem;">일반 정보글에서 다루지 못하는, 대가족 여행 조율의 핵심 철학과 기획자의 마인드셋을 고백합니다.</p>

    <div id="column-list-target"></div>
  </main>

  <footer id="common-footer"></footer>

  <script src="../assets/js/db.js"></script>
  <script src="../assets/js/core.js"></script>
  <script>
    function initPage() {
      document.getElementById("prof-name").innerText = SiteConfig.ownerName;
      document.getElementById("prof-bio").innerText = SiteConfig.ownerBio;

      // 관리자 세션 체크 및 유동적 분기 UI 활성화
      const sessionZone = document.getElementById("admin-session-zone");
      if (isAdminLoggedIn()) {
        sessionZone.innerHTML = `
          <div class="admin-badge-banner">
            <span>안녕하세요 ${SiteConfig.ownerName} 최고관리자님, 현재 세션이 활성화되어 있습니다.</span>
            <a href="../admin/index.html?tab=column-add" class="btn-admin-action">✍ 새 칼럼 작성하기</a>
          </div>
        `;
      } else {
        sessionZone.innerHTML = `
          <div style="background:#f1f5f9; padding:0.75rem 1rem; border-radius:6px; margin-bottom:2rem; font-size:0.9rem; color:#475569;">
            💡 <strong>운영자 공식 칼럼 채널입니다.</strong> 여행 기획 의뢰 및 비즈니스 제안은 문의 페이지를 이용바랍니다.
          </div>
        `;
      }

      // 칼럼 데이터 리스트업
      const columns = getStorageData("columns_data") || ColumnsData;
      const container = document.getElementById("column-list-target");

      columns.forEach(c => {
        container.innerHTML += `
          <article style="background:#fff; border:1px solid var(--border-color); padding:2rem; border-radius:8px; margin-bottom:2rem;">
            <h3 style="font-size:1.4rem; color:var(--dark-color); margin-bottom:0.5rem;">${c.title}</h3>
            <p style="font-size:0.85rem; color:#94a3b8; margin-bottom:1rem;">발행 에디터: ${SiteConfig.ownerName} | 작성일: ${c.date}</p>
            <blockquote style="background:#f8fafc; border-left:4px solid var(--main-color); padding:0.75rem 1rem; margin-bottom:1.5rem; font-style:italic; color:#475569;">
              "${c.summary}"
            </blockquote>
            <div style="white-space:pre-wrap; color:#334155; line-height:1.8; margin-bottom:1.5rem;">${c.content}</div>
            <div style="background:#fffbeb; padding:0.75rem 1rem; border-radius:4px; font-size:0.85rem; color:#b45309;">
              <strong>📝 에디터 비하인드 노트:</strong> ${c.memo || "기록된 메모가 없습니다."}
            </div>
          </article>
        `;
      });
    }
  </script>
</body>
</html>
