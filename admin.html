<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사전 통합 제어판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: #f1f5f9; }
        #editor:empty:not(:focus):before { content: attr(data-placeholder); color: #94a3b8; }
        #editor img { max-width: 200px; max-height: 150px; display: block; border-radius: 6px; margin: 8px 0; border: 2px dashed #cbd5e1; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col justify-center items-center py-12">

    <div id="loginSection" class="w-full max-w-md bg-white border border-slate-200 shadow-xl rounded-2xl p-8 space-y-6">
        <div class="text-center">
            <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center text-xl mx-auto mb-3 shadow-inner">
                <i class="fa-solid fa-vault"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-950 tracking-tight">관리자 시스템 인증</h2>
            <p class="text-slate-400 text-xs mt-1">용어 추가 및 사이트 제어를 위해 로그인하세요.</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">ID</label>
                <input type="text" id="adminId" placeholder="아이디 입력" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 transition-all">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">PASSWORD</label>
                <input type="password" id="adminPw" placeholder="비밀번호 입력" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 transition-all">
            </div>
            <button onclick="checkLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm py-3 rounded-xl shadow-lg shadow-blue-500/10 transition-colors">로그인</button>
        </div>
    </div>

    <div id="adminSection" class="w-full max-w-4xl mx-auto px-4 hidden space-y-8">
        <div class="bg-white border border-slate-200 rounded-2xl p-6 flex flex-col sm:flex-row justify-between items-center shadow-sm gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center text-slate-700 text-lg"><i class="fa-solid fa-gears"></i></div>
                <div>
                    <h2 class="font-extrabold text-lg text-slate-950">사전 관리 시스템</h2>
                    <p class="text-xs text-slate-400">데이터의 추가, 변경, 삭제 및 SEO 마찰을 자동화 제어합니다.</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="backupData()" class="px-4 py-2 text-xs font-semibold border border-slate-200 rounded-xl bg-slate-50 hover:bg-slate-100 transition-all"><i class="fa-solid fa-file-export mr-1"></i>데이터 백アップ</button>
                <button onclick="logout()" class="px-4 py-2 text-xs font-semibold text-white bg-rose-500 hover:bg-rose-600 rounded-xl transition-all shadow-md shadow-rose-500/10">로그아웃</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-start">
            <div class="md:col-span-2 space-y-6">
                <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm space-y-4">
                    <h3 class="font-bold text-slate-950 text-sm flex items-center gap-2 border-b border-slate-100 pb-2"><i class="fa-solid fa-pen text-blue-600"></i>용어 등록 / 편집기</h3>
                    <div>
                        <input type="text" id="wordTitle" placeholder="용어 이름 명시 (예: SEO)" class="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 transition-all">
                    </div>
                    <div>
                        <div id="editor" contenteditable="true" data-placeholder="이곳에 설명을 적거나 이미지를 바로 붙여넣으세요 (Ctrl + V). 마크다운 주석(#) 없이 일반 텍스트로 적으시면 메인 화면에 고급 폰트로 자동 변환됩니다." 
                             class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm min-h-[220px] focus:outline-none focus:border-blue-500 transition-all bg-slate-50"></div>
                    </div>
                    <button onclick="saveTerm()" class="w-full bg-slate-900 hover:bg-slate-950 text-white font-bold text-xs py-3 rounded-xl transition-colors"><i class="fa-solid fa-floppy-disk mr-1"></i>사전 원장에 저장하기</button>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm space-y-4">
                <h3 class="font-bold text-slate-950 text-sm flex items-center gap-2 border-b border-slate-100 pb-2"><i class="fa-solid fa-table-list text-slate-500"></i>인덱싱된 용어</h3>
                <div id="adminTermList" class="space-y-2 max-h-[380px] overflow-y-auto pr-1">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let terms = JSON.parse(localStorage.getItem('dictionaryTerms')) || [];

        function checkLogin() {
            if(document.getElementById('adminId').value === 'admin' && document.getElementById('adminPw').value === 'thqkd119!') {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminSection').classList.remove('hidden');
                document.body.className = "text-slate-800 antialiased bg-slate-100 py-6";
                loadAdminData();
            } else { alert('인증 자격 증명이 일치하지 않습니다.'); }
        }

        function logout() { location.reload(); }

        function loadAdminData() {
            const listEl = document.getElementById('adminTermList');
            listEl.innerHTML = '';
            if(terms.length === 0) {
                listEl.innerHTML = '<p class="text-xs text-slate-400 text-center py-4">등록된 인덱스가 없습니다.</p>';
                return;
            }
            terms.forEach((item, index) => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-2.5 bg-slate-50 rounded-xl border border-slate-200/60";
                row.innerHTML = `
                    <div class="truncate max-w-[120px]">
                        <span class="text-xs font-bold text-slate-900 block truncate">${item.word}</span>
                        <span class="text-[10px] text-slate-400"><i class="fa-regular fa-eye"></i> ${item.views || 0}</span>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="editTerm(${index})" class="p-1.5 bg-amber-50 text-amber-600 rounded-lg text-[10px] hover:bg-amber-100 transition-colors"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="deleteTerm(${index})" class="p-1.5 bg-rose-50 text-rose-600 rounded-lg text-[10px] hover:bg-rose-100 transition-colors"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
                listEl.appendChild(row);
            });
        }

        // 붙여넣기 기능 개편 (Base64 파일 주입)
        document.getElementById('editor').addEventListener('paste', function(e) {
            const clipboardData = e.clipboardData || window.clipboardData;
            if(!clipboardData) return;
            
            const items = clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    e.preventDefault();
                    const file = items[i].getAsFile();
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const imgTag = document.createElement('img');
                        imgTag.src = event.target.result;
                        imgTag.className = "max-w-full rounded-lg my-2 shadow-sm border border-slate-200";
                        document.getElementById('editor').appendChild(imgTag);
                    };
                    reader.readAsDataURL(file);
                }
            }
        });

        function saveTerm() {
            const word = document.getElementById('wordTitle').value.trim();
            const content = document.getElementById('editor').innerHTML;
            if(!word || !content) return alert('용어 제목과 내용을 모두 기술해 주세요.');

            const idx = terms.findIndex(t => t.word.toLowerCase() === word.toLowerCase());
            if(idx > -1) {
                terms[idx].content = content;
            } else {
                terms.push({ word, content, views: 0 });
            }

            localStorage.setItem('dictionaryTerms', JSON.stringify(terms));
            generateMetaTags(); // 로컬 동적 메타 인덱스 싱크작업
            
            document.getElementById('wordTitle').value = '';
            document.getElementById('editor').innerHTML = '';
            loadAdminData();
            alert(`용어 [${word}] 저장 및 검색엔진 최적화 배포 완료.`);
        }

        function generateMetaTags() {
            const keywordString = terms.map(t => t.word).join(', ');
            localStorage.setItem('dictionaryMetaKeywords', keywordString);
            const descString = terms.map(t => t.word).slice(0, 8).join(', ') + ' 등 헷갈리는 IT/비즈니스 실무 용어를 완벽하게 모아둔 지식 창고';
            localStorage.setItem('dictionaryMetaDescription', descString);
        }

        function editTerm(index) {
            const item = terms[index];
            document.getElementById('wordTitle').value = item.word;
            document.getElementById('editor').innerHTML = item.content;
            document.getElementById('wordTitle').focus();
        }

        function deleteTerm(index) {
            if(confirm(`[${terms[index].word}] 용어 데이터를 영구 삭제하시겠습니까?`)) {
                terms.splice(index, 1);
                localStorage.setItem('dictionaryTerms', JSON.stringify(terms));
                generateMetaTags();
                loadAdminData();
            }
        }

        function backupData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(terms, null, 2));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", "dictionary_core_backup.json");
            dlAnchor.click();
        }
    </script>
</body>
</html>
