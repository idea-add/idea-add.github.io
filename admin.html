<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알쏭달쏭 사전 제어판 - 업그레이드</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 기본 스타일 */
        :root { --primary-color: #3b82f6; --primary-hover: #2563eb; --bg-color: #f3f4f6; --text-color: #111827; --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); --secondary-color: #1f2937; --danger-color: #ef4444; --danger-hover: #dc2626; --edit-color: #f59e0b; --edit-hover: #d97706; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"; margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); line-height: 1.5; }
        .hidden { display: none; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 20px; margin-bottom: 30px; }
        .dashboard-header h2 { margin: 0; font-size: 28px; font-weight: 800; }
        .dashboard-header .actions { display: flex; gap: 10px; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: var(--box-shadow); margin-bottom: 30px; }
        .box-title { display: flex; align-items: center; font-size: 20px; font-weight: 700; color: var(--primary-color); margin-bottom: 20px; }
        .box-title i { margin-right: 10px; }
        input[type="text"], textarea { width: 100%; padding: 12px 16px; margin: 10px 0 20px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: #fff; color: var(--text-color); }
        input[type="text"]::placeholder, textarea::placeholder { color: #888; }
        #editor { min-height: 250px; background: #fff; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; font-size: 16px; }
        #editor:empty:not(:focus):before { content: attr(data-placeholder); color: #888; }
        /* 버튼 스타일 */
        button { background-color: var(--primary-color); color: white; border: none; padding: 12px 24px; cursor: pointer; border-radius: 8px; font-size: 16px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: background-color 0.2s, transform 0.1s; }
        button:hover { background-color: var(--primary-hover); }
        button:active { transform: translateY(1px); }
        button.danger { background-color: var(--danger-color); }
        button.danger:hover { background-color: var(--danger-hover); }
        button.edit { background-color: var(--edit-color); }
        button.edit:hover { background-color: var(--edit-hover); }
        button i { font-size: 14px; }
        /* 용어 목록 스타일 */
        .admin-term-list { border-top: 1px solid #ddd; }
        .admin-term-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee; transition: background-color 0.2s; }
        .admin-term-item:last-child { border-bottom: none; }
        .admin-term-item:hover { background-color: #f9fafb; }
        .admin-term-word { font-weight: 700; font-size: 18px; color: var(--secondary-color); }
        .admin-term-views { color: #666; font-size: 14px; margin-right: 15px; }
        .term-actions { display: flex; gap: 8px; }
        /* 디자인 테마 섹션 */
        #themeCss { font-family: "Courier New", Courier, monospace; background-color: #f1f5f9; color: #475569; }
        /* 로그인 섹션 */
        #loginSection { text-align: center; margin-top: 120px; }
        #loginSection i { font-size: 50px; color: var(--primary-color); margin-bottom: 20px; }
        #loginSection h2 { font-size: 30px; margin-bottom: 30px; font-weight: 800; }
        #loginSection input { max-width: 350px; margin: 10px auto; display: block; }
        #loginSection button { width: 100%; max-width: 350px; }
    </style>
</head>
<body>
    <div id="loginSection" class="box container">
        <i class="fas fa-user-shield"></i>
        <h2>관리자 로그인</h2>
        <input type="text" id="adminId" placeholder="아이디">
        <input type="password" id="adminPw" placeholder="비밀번호">
        <button onclick="checkLogin()"><i class="fas fa-sign-in-alt"></i> 로그인</button>
    </div>

    <div id="adminSection" class="hidden container">
        <div class="dashboard-header box">
            <h2><i class="fas fa-cogs"></i> 알쏭달쏭 사전 제어판</h2>
            <div class="actions">
                <button onclick="backupData()"><i class="fas fa-download"></i> 데이터 백업</button>
                <button class="danger" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 로그아웃</button>
            </div>
        </div>

        <div class="box">
            <div class="box-title"><i class="fas fa-pen-nib"></i> 📝 용어 등록 / 수정</div>
            <input type="text" id="wordTitle" placeholder="용어 이름 (예: SEO)">
            <div id="editor" contenteditable="true" data-placeholder="용어의 상세 설명을 입력하세요... 이미지를 붙여넣을 수 있습니다."></div>
            <button onclick="saveTerm()"><i class="fas fa-check"></i> 저장하기</button>
        </div>

        <div class="box">
            <div class="box-title"><i class="fas fa-paint-brush"></i> 🎨 테마 설정 (CSS)</div>
            <textarea id="themeCss" rows="6" placeholder="메인 화면(`index.html`)에 적용할 CSS 코드를 입력하세요."></textarea>
            <button onclick="saveTheme()"><i class="fas fa-fill-drip"></i> 테마 저장</button>
        </div>

        <div class="box">
            <div class="box-title"><i class="fas fa-list-ul"></i> 📋 등록된 용어 목록</div>
            <div id="adminTermList" class="admin-term-list"></div>
        </div>
    </div>

    <script>
        let terms = JSON.parse(localStorage.getItem('dictionaryTerms')) || [];

        // 로그인 확인
        function checkLogin() {
            if(document.getElementById('adminId').value === 'admin' && document.getElementById('adminPw').value === 'thqkd119!') {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminSection').classList.remove('hidden');
                loadAdminData();
            } else { alert('아이디 또는 비밀번호가 올바르지 않습니다.'); }
        }

        // 로그아웃
        function logout() { location.reload(); }

        // 관리자 데이터 불러오기
        function loadAdminData() {
            document.getElementById('themeCss').value = localStorage.getItem('customTheme') || '';
            const listEl = document.getElementById('adminTermList');
            listEl.innerHTML = '';
            if (terms.length === 0) { listEl.innerHTML = '<p style="text-align:center;color:#666;">등록된 용어가 없습니다.</p>'; return; }
            terms.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'admin-term-item';
                div.innerHTML = `
                    <span class="admin-term-word">${item.word}</span>
                    <div class="term-actions">
                        <span class="admin-term-views"><i class="fas fa-eye"></i> ${item.views || 0}</span>
                        <button class="edit btn-sm" onclick="editTerm(${index})"><i class="fas fa-edit"></i> 수정</button>
                        <button class="danger btn-sm" onclick="deleteTerm(${index})"><i class="fas fa-trash"></i> 삭제</button>
                    </div>
                `;
                listEl.appendChild(div);
            });
        }

        // 용어 저장 및 메타태그 자동 생성
        function saveTerm() {
            const word = document.getElementById('wordTitle').value.trim();
            const content = document.getElementById('editor').innerHTML;
            if(!word || content==='') return alert('용어 이름과 내용을 모두 채워주세요.');
            const idx = terms.findIndex(item => item.word === word);
            if(idx > -1) { terms[idx].content = content; } 
            else { terms.push({ word, content, views: 0 }); }
            localStorage.setItem('dictionaryTerms', JSON.stringify(terms));
            generateMetaTags(); // 메타태그 자동 생성
            document.getElementById('wordTitle').value = '';
            document.getElementById('editor').innerHTML = '';
            loadAdminData();
            alert(`용어 '${word}'가 저장되었습니다.`);
        }

        // 메타태그 자동 생성 (keywords, description)
        function generateMetaTags() {
            const wordsList = terms.map(t => t.word).join(', ');
            localStorage.setItem('dictionaryMetaKeywords', wordsList);
            const shortDesc = terms.map(t => t.word).slice(0, 10).join(', ') + '... 헷갈리는 용어들을 쉽고 빠르게 찾아보세요!';
            localStorage.setItem('dictionaryMetaDescription', shortDesc);
        }

        // 용어 수정
        function editTerm(index) {
            const item = terms[index];
            document.getElementById('wordTitle').value = item.word;
            document.getElementById('editor').innerHTML = item.content;
            document.getElementById('wordTitle').focus();
        }

        // 용어 삭제
        function deleteTerm(index) {
            if(confirm(`정말 '${terms[index].word}' 용어를 삭제하시겠습니까?`)) {
                terms.splice(index, 1);
                localStorage.setItem('dictionaryTerms', JSON.stringify(terms));
                generateMetaTags(); // 메타태그 업데이트
                loadAdminData();
            }
        }

        // 테마 저장
        function saveTheme() {
            localStorage.setItem('customTheme', document.getElementById('themeCss').value);
            alert('테마가 저장되었습니다. 메인 화면에 즉시 적용됩니다.');
        }

        // 데이터 백업 (JSON 다운로드)
        function backupData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(terms, null, 2));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "dictionary_backup.json"); dl.click();
        }

        // 이미지 붙여넣기 기능 완벽 지원
        const editor = document.getElementById('editor');
        editor.addEventListener('paste', (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    e.preventDefault(); // 기본 붙여넣기 동작 방지
                    const file = items[i].getAsFile();
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = `<img src="${e.target.result}" style="max-width:100%; border-radius:8px; margin-top:10px;">`;
                        document.execCommand('insertHTML', false, img); // 이미지를 HTML로 삽입
                    };
                    reader.readAsDataURL(file);
                }
            }
        });
    </script>
</body>
</html>
